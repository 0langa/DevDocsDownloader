name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: 1.0.1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: microsoft/setup-msbuild@v2

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,gui,tokenizer,browser,benchmark]
          python -m pip install pyinstaller build

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Validate version consistency
        run: python scripts/check_version.py

      - name: Load release version
        shell: pwsh
        run: |
          $version = (Get-Content version.json | ConvertFrom-Json).version
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run test and build gates
        run: python -m pytest -q

      - name: Build frozen desktop backend
        run: python scripts/build_desktop_backend.py --clean

      - name: Build desktop shell
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'desktop\publish\desktop'
          Remove-Item -Recurse -Force $publishDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null
          msbuild desktop/DevDocsDownloader.Desktop/DevDocsDownloader.Desktop.csproj /restore /t:Publish /p:Configuration=Release /p:Platform=x64 /p:PublishDir="$publishDir\"

      - name: Assemble release layout
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'desktop\publish\desktop'
          $desktopExe = Join-Path $publishDir 'DevDocsDownloader.Desktop.exe'
          if (-not (Test-Path $desktopExe)) {
            throw "Published desktop shell not found at $desktopExe"
          }
          New-Item -ItemType Directory -Force -Path (Join-Path $publishDir 'backend') | Out-Null
          Copy-Item dist/DevDocsDownloader.Backend/* (Join-Path $publishDir 'backend') -Recurse -Force

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$env:RELEASE_VERSION /DMyOutputBaseFilename=DevDocsDownloader-Setup-$env:RELEASE_VERSION "desktop\installer\DevDocsDownloader.iss"

      - name: Build portable zip
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'desktop\publish\desktop'
          New-Item -ItemType Directory -Force -Path dist\portable | Out-Null
          Compress-Archive -Path "$publishDir\*" -DestinationPath "dist/portable/DevDocsDownloader-Portable-$env:RELEASE_VERSION.zip" -Force

      - name: Write checksums
        shell: pwsh
        run: |
          $files = @(
            "dist\installer\DevDocsDownloader-Setup-$env:RELEASE_VERSION.exe",
            "dist\portable\DevDocsDownloader-Portable-$env:RELEASE_VERSION.zip"
          )
          $lines = foreach ($file in $files) {
            $hash = Get-FileHash $file -Algorithm SHA256
            "$($hash.Hash)  $(Split-Path $file -Leaf)"
          }
          $lines | Set-Content dist\SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-notes.md
          files: |
            dist/installer/DevDocsDownloader-Setup-*.exe
            dist/portable/DevDocsDownloader-Portable-*.zip
            dist/SHA256SUMS.txt

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-ci:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: microsoft/setup-msbuild@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,gui,tokenizer,browser,benchmark]

      - name: Check version consistency
        run: python scripts/check_version.py

      - name: Run Python tests
        run: python -m pytest -q

      - name: Ruff
        run: python -m ruff check .

      - name: Ruff format
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy doc_ingest

      - name: Python compile check
        shell: pwsh
        run: Get-ChildItem doc_ingest,tests,scripts -Recurse -Filter *.py | ForEach-Object { python -m py_compile $_.FullName }

      - name: Desktop backend smoke
        run: python -m pytest tests/test_desktop_backend.py -q

      - name: Build WinUI desktop shell
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'desktop\publish\ci-desktop'
          Remove-Item -Recurse -Force $publishDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $publishDir | Out-Null
          msbuild desktop/DevDocsDownloader.Desktop/DevDocsDownloader.Desktop.csproj /restore /t:Publish /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:SelfContained=true /p:WindowsAppSDKSelfContained=true /p:PublishDir="$publishDir\"
          if (-not (Test-Path (Join-Path $publishDir 'DevDocsDownloader.Desktop.exe'))) {
            throw 'Published desktop shell executable was not produced.'
          }
          $priFile = Get-ChildItem (Join-Path $env:GITHUB_WORKSPACE 'desktop\DevDocsDownloader.Desktop\bin') -Filter 'DevDocsDownloader.Desktop.pri' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($priFile) {
            Copy-Item $priFile.FullName $publishDir -Force
          } else {
            Write-Warning 'DevDocsDownloader.Desktop.pri not found - XAML resources will fail at runtime.'
          }

      - name: Smoke launch WinUI desktop shell
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'desktop\publish\ci-desktop'
          $exe = Join-Path $publishDir 'DevDocsDownloader.Desktop.exe'
          $logPath = Join-Path $env:LOCALAPPDATA 'DevDocsDownloader\logs\desktop-shell.log'
          Remove-Item $logPath -ErrorAction SilentlyContinue
          $process = Start-Process -FilePath $exe -WorkingDirectory $publishDir -PassThru
          Start-Sleep -Seconds 8
          if ($process.HasExited) {
            if (Test-Path $logPath) {
              Get-Content $logPath
            }
            throw "Desktop shell exited during smoke launch with code $($process.ExitCode)."
          }
          Stop-Process -Id $process.Id -Force
